<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition Match Dashboard</title>
    <style>
        :root {
            --red-alliance: #ff4d4d;
            --blue-alliance: #4d94ff;
            --bg-dark: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            background: #000;
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        button.active {
            background: #007bff;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        /* Match Card Styling */
        .match-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            border-left: 5px solid #555;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .alliance-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alliance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-radius: 4px;
        }

        .red { background: rgba(255, 77, 77, 0.2); border: 1px solid var(--red-alliance); }
        .blue { background: rgba(77, 148, 255, 0.2); border: 1px solid var(--blue-alliance); }

        .team-list { font-weight: bold; letter-spacing: 1px; }
        .score { font-size: 1.5rem; font-weight: 800; }
        
        .winner { border-width: 3px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<nav>
    <button onclick="showSection('upcoming')" id="btn-upcoming" class="active">Upcoming Matches (Next 6)</button>
    <button onclick="showSection('results')" id="btn-results">Previous Match Results</button>
</nav>

<div class="container">
    <div id="upcoming" class="view-section active">
        </div>

    <div id="results" class="view-section">
        </div>
</div>

    function parseCSV(csv) {
        const lines = csv.trim().split('\n');
        const headers = lines[0].split(',');
        return lines.slice(1).map(line => {
            const values = line.split(',');
            const obj = {};
            headers.forEach((header, i) => obj[header] = values[i]);
            return obj;
        });
    }

    const matches = parseCSV(rawData);

    // Filter logic: Matches with scores are "results", without scores are "upcoming"
    const finishedMatches = matches.filter(m => m.red_score !== "" && m.red_score !== undefined);
    const upcomingMatches = matches.filter(m => m.red_score === "" || m.red_score === undefined);

    function createMatchCard(m, isResult = false) {
        const redWin = parseInt(m.red_score) > parseInt(m.blue_score);
        const blueWin = parseInt(m.blue_score) > parseInt(m.red_score);

        return `
            <div class="match-card">
                <div class="match-header">
                    <span>MATCH ${m.match_number}</span>
                    <span>${m.scheduled_time}</span>
                </div>
                <div class="alliance-container">
                    <div class="alliance-row red ${isResult && redWin ? 'winner' : ''}">
                        <div class="team-list">${m.red1}, ${m.red2}, ${m.red3}</div>
                        <div class="score">${m.red_score || '-'}</div>
                    </div>
                    <div class="alliance-row blue ${isResult && blueWin ? 'winner' : ''}">
                        <div class="team-list">${m.blue1}, ${m.blue2}, ${m.blue3}</div>
                        <div class="score">${m.blue_score || '-'}</div>
                    </div>
                </div>
            </div>
        `;
    }

    function render() {
        // Render Upcoming (First 6)
        const upcomingContainer = document.getElementById('upcoming');
        upcomingContainer.innerHTML = upcomingMatches.slice(0, 6)
            .map(m => createMatchCard(m)).join('');

        // Render Results (Previous)
        const resultsContainer = document.getElementById('results');
        // Sort finished matches to show latest first
        resultsContainer.innerHTML = [...finishedMatches].reverse()
            .map(m => createMatchCard(m, true)).join('');
    }

    function showSection(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    // Initial Load
    render();
</script>

</html>
