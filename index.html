<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 4206 | Live Event Dashboard</title>
    <style>
        :root {
            --red-alliance: #ff4d4d;
            --blue-alliance: #4d94ff;
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --highlight: #ffcc00;
            --accent: #007bff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            background: #000;
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--accent);
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }

        button.active { background: var(--accent); }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 20px 0;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Grid for Match Cards */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        /* Match Card Styles */
        .match-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #333;
            position: relative;
        }

        .match-card.featured { border: 2px solid var(--highlight); box-shadow: 0 0 10px rgba(255,204,0,0.2); }

        .alliance-row {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
        }

        .red { background: rgba(255, 77, 77, 0.15); border-left: 5px solid var(--red-alliance); }
        .blue { background: rgba(77, 148, 255, 0.15); border-left: 5px solid var(--blue-alliance); }
        .winner-row { outline: 2px solid white; background: rgba(255,255,255,0.1); }

        .target-team { color: var(--highlight); font-weight: bold; text-shadow: 0 0 5px var(--highlight); }
        .score { font-size: 1.4rem; font-weight: bold; }

        /* Standings Table */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 10px; }
        th { background: var(--accent); padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        .my-team-row { background: rgba(255,204,0,0.1); border-left: 4px solid var(--highlight); }

        h2 { border-bottom: 1px solid #444; padding-bottom: 10px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showSection('upcoming')" id="btn-upcoming" class="active">NEXT 6 MATCHES</button>
    <button onclick="showSection('results')" id="btn-results">RESULTS</button>
    <button onclick="showSection('standings')" id="btn-standings">STANDINGS</button>
</nav>

<div class="container">
    <div id="upcoming" class="view-section active">
        <h2>Upcoming Matches</h2>
        <div id="upcoming-grid" class="match-grid">Loading matches...</div>
    </div>

    <div id="results" class="view-section">
        <h2>Match History</h2>
        <div id="results-grid" class="match-grid">Loading results...</div>
    </div>

    <div id="standings" class="view-section">
        <h2>Current Standings</h2>
        <table>
            <thead>
                <tr><th>Rank</th><th>Team</th><th>W-L-T</th><th>Avg RP</th><th>Total RP</th></tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>
</div>

<script>
    const TBA_KEY = "0XbNGhiDP1EkHijk4BifYYDmfZHXetlQXxEVv3Gs3V2aCL03k38XdQJP5CbGCBH7";
    const EVENT_KEY = "2026txcmp2";
    const TARGET_TEAM = "4206";

    async function fetchData() {
        try {
            // Fetch Matches
            const mRes = await fetch(`https://www.thebluealliance.com/api/v3/event/${EVENT_KEY}/matches/simple`, {
                headers: { 'X-TBA-Auth-Key': TBA_KEY }
            });
            const matches = await mRes.json();
            
            // Fetch Standings
            const sRes = await fetch(`https://www.thebluealliance.com/api/v3/event/${EVENT_KEY}/rankings`, {
                headers: { 'X-TBA-Auth-Key': TBA_KEY }
            });
            const rankings = await sRes.json();

            processMatches(matches);
            processRankings(rankings.rankings);
        } catch (e) {
            console.error("Fetch failed", e);
        }
    }

    function processMatches(matches) {
        const sorted = matches
            .filter(m => m.comp_level === 'qm')
            .sort((a, b) => a.match_number - b.match_number);

        const finished = sorted.filter(m => m.alliances.red.score !== -1);
        const upcoming = sorted.filter(m => m.alliances.red.score === -1);

        renderMatchGrid('upcoming-grid', upcoming.slice(0, 6), false);
        renderMatchGrid('results-grid', [...finished].reverse(), true);
    }

    function renderMatchGrid(id, matches, isResult) {
        const container = document.getElementById(id);
        container.innerHTML = matches.map(m => {
            const redTeams = m.alliances.red.team_keys.map(k => k.replace('frc', ''));
            const blueTeams = m.alliances.blue.team_keys.map(k => k.replace('frc', ''));
            const hasTarget = [...redTeams, ...blueTeams].includes(TARGET_TEAM);
            
            const rScore = m.alliances.red.score;
            const bScore = m.alliances.blue.score;

            return `
                <div class="match-card ${hasTarget ? 'featured' : ''}">
                    <div style="display:flex; justify-content:space-between; color:#888; font-size:0.8rem">
                        <b>QUAL ${m.match_number}</b>
                        <span>${m.time ? new Date(m.time * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                    </div>
                    <div class="alliance-row red ${isResult && rScore > bScore ? 'winner-row' : ''}">
                        <span>${redTeams.map(t => t === TARGET_TEAM ? `<span class="target-team">${t}</span>` : t).join(', ')}</span>
                        <span class="score">${rScore > -1 ? rScore : '-'}</span>
                    </div>
                    <div class="alliance-row blue ${isResult && bScore > rScore ? 'winner-row' : ''}">
                        <span>${blueTeams.map(t => t === TARGET_TEAM ? `<span class="target-team">${t}</span>` : t).join(', ')}</span>
                        <span class="score">${bScore > -1 ? bScore : '-'}</span>
                    </div>
                </div>`;
        }).join('');
    }

    function processRankings(ranks) {
        const body = document.getElementById('standings-body');
        if(!ranks) return;
        body.innerHTML = ranks.map(r => {
            const teamNum = r.team_key.replace('frc', '');
            return `
                <tr class="${teamNum === TARGET_TEAM ? 'my-team-row' : ''}">
                    <td>${r.rank}</td>
                    <td class="${teamNum === TARGET_TEAM ? 'target-team' : ''}">${teamNum}</td>
                    <td>${r.record.wins}-${r.record.losses}-${r.record.ties}</td>
                    <td>${(r.extra_stats[0] || 0).toFixed(2)}</td>
                    <td>${r.qual_average || 0}</td>
                </tr>`;
        }).join('');
    }

    function showSection(id) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    // Refresh every 60 seconds
    setInterval(fetchData, 60000);
    fetchData();
</script>
</body>
</html>
