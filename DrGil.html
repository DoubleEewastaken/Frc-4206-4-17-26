<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrGil Global Remote</title>
    <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js"></script>
    <style>
        body { background: #080808; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .status { padding: 15px; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #333; }
        .online { color: #00e676; }
        .offline { color: #ff1744; }
        
        .btn { 
            width: 90%; height: 140px; font-size: 2rem; font-weight: 900; 
            margin: 10px 0; border-radius: 20px; border: 4px solid #333; 
            cursor: pointer; background: #1a1a1a; color: #444; transition: 0.2s;
        }
        /* Active State */
        .btn.active { 
            background: #00e676; color: black; border-color: white;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.5);
        }
    </style>
</head>
<body>

    <div id="status" class="status offline">HOTEL STATUS: OFFLINE</div>

    <button id="main-btn" class="btn" onclick="setScene('4/18/26-Main')">MAIN SCENE</button>
    <button id="stream-btn" class="btn" onclick="setScene('4/18/26-Stream')">STREAM SCENE</button>

    <script>
        const obs = new OBSWebSocket();
        // The address from your ngrok terminal
        const ADDR = 'wss://nimble-dispense-strife.ngrok-free.dev'; 
        const PASS = 'K6Yn0di5rUHktAsD'; // Set this to your OBS password!

        async function connect() {
            try {
                await obs.connect(ADDR, PASS);
                document.getElementById('status').innerText = "HOTEL STATUS: ONLINE";
                document.getElementById('status').className = "status online";
                
                // Get current scene to highlight the right button
                const { currentProgramSceneName } = await obs.call('GetCurrentProgramScene');
                updateButtons(currentProgramSceneName);
            } catch (e) {
                document.getElementById('status').innerText = "HOTEL STATUS: OFFLINE (Check Ngrok)";
                setTimeout(connect, 5000); // Try again in 5s
            }
        }

        async function setScene(name) {
            try {
                await obs.call('SetCurrentProgramScene', { 'sceneName': name });
            } catch (e) { alert("Command Failed"); }
        }

        function updateButtons(activeName) {
            document.getElementById('main-btn').classList.toggle('active', activeName === '4/18/26-Main');
            document.getElementById('stream-btn').classList.toggle('active', activeName === '4/18/26-Stream');
        }

        obs.on('CurrentProgramSceneChanged', data => updateButtons(data.sceneName));
        
        connect();
    </script>
</body>
</html>
